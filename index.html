<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Soul &amp; Story">
<title>Soul &amp; Story</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f0ebe0;min-height:100vh}
.header{background:#f0ebe0;border-bottom:1.5px solid #c8833a;padding:16px 20px 12px;text-align:center}
.logo-row{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:6px}
.logo-img{width:70px;height:70px;object-fit:contain;flex-shrink:0}
.brand-text{text-align:left}
.brand-title{font-family:Georgia,serif;font-size:26px;font-weight:700;color:#4a6741;line-height:1.1}
.brand-amp{color:#c8833a}
.brand-tamil{font-size:11px;color:#c8833a;letter-spacing:1.2px;margin-top:3px;font-family:-apple-system,sans-serif}
.divider{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px}
.divider-line{width:36px;height:1px;background:#c8833a;opacity:0.6}
.divider-heart{color:#c8833a;font-size:10px}
.nafila-line{font-size:12px;font-weight:600;color:#4a6741;margin-top:5px;letter-spacing:0.3px}
.founder-line{font-size:10px;color:#7a7060;margin-top:2px;letter-spacing:0.2px;font-style:italic}
.screen{padding:18px;max-width:480px;margin:0 auto}
.card{background:#fff;border-radius:14px;padding:18px;margin-bottom:12px;border:1px solid #e8e2d8}
.lbl{font-size:11px;font-weight:600;color:#7a7060;margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:0.6px}
.inp{width:100%;height:46px;border:1.5px solid #d9d2c2;border-radius:10px;padding:0 14px;font-size:16px;background:#faf8f4;color:#2d2a24;outline:none;-webkit-appearance:none;appearance:none}
.inp:focus{border-color:#4a6741;background:#fff}
.sel{width:100%;height:46px;border:1.5px solid #d9d2c2;border-radius:10px;padding:0 12px;font-size:15px;background:#faf8f4;color:#2d2a24;outline:none;-webkit-appearance:none;appearance:none}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field{margin-bottom:13px}
.btn-check{width:100%;height:50px;background:#4a6741;color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:700;margin-top:6px;cursor:pointer}
.btn-save{width:100%;height:50px;background:#4a6741;color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:700;margin-top:8px;cursor:pointer}
.btn-new{width:100%;height:46px;background:transparent;border:1.5px solid #4a6741;color:#4a6741;border-radius:12px;font-size:15px;font-weight:600;margin-top:10px;cursor:pointer}
.badge{display:flex;align-items:center;gap:12px;background:#f0ebe0;border-radius:10px;padding:12px 14px;margin-bottom:14px;border:1px solid #d9d2c2}
.av{width:40px;height:40px;border-radius:50%;background:#4a6741;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.badge-name{font-size:15px;font-weight:700;color:#2d2a24}
.badge-sub{font-size:12px;color:#7a7060;margin-top:2px}
.success-box{background:#f0ebe0;border-radius:14px;padding:22px;text-align:center;border:1px solid #d9d2c2}
.success-title{font-size:19px;font-weight:700;color:#4a6741;font-family:Georgia,serif}
.success-sub{font-size:14px;color:#7a7060;margin-top:5px}
.stat{background:#fff;border-radius:10px;padding:11px 14px;margin-top:10px;text-align:left;border:1px solid #e8e2d8}
.stat-lbl{font-size:11px;color:#a09880;text-transform:uppercase;letter-spacing:0.5px}
.stat-val{font-size:21px;font-weight:700;color:#4a6741;margin-top:2px;font-family:Georgia,serif}
.err{background:#FCEBEB;border-radius:10px;padding:11px 14px;color:#A32D2D;font-size:13px;margin-top:10px}
.hidden{display:none}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

          <select class="sel" id="new-gender">
            <option value="">Select</option>
            <option>Female</option>
            <option>Male</option>
            <option>Other</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label class="lbl">Session date</label>
        <input class="inp" id="new-date" type="text" placeholder="dd/mm/yyyy">
      </div>
      <div class="field">
        <label class="lbl">Session fee (&#8377;)</label>
        <input class="inp" id="new-fee" type="number" placeholder="750" inputmode="numeric">
      </div>
      <div class="field">
        <label class="lbl">Comments (optional)</label>
        <input class="inp" id="new-comments" type="text" placeholder="Session notes">
      </div>
      <button class="btn-save" id="btn-new-save" onclick="saveNew()">Save client</button>
      <div id="new-err" class="err hidden"></div>
    </div>
  </div>

  <div id="view-existing" class="hidden">
    <div class="badge">
      <div class="av" id="existing-avatar">?</div>
      <div>
        <div class="badge-name" id="existing-name">â</div>
        <div class="badge-sub" id="existing-meta">â</div>
      </div>
    </div>
    <div class="card">
      <div class="field">
        <label class="lbl">Session date</label>
        <input class="inp" id="ex-date" type="text" placeholder="dd/mm/yyyy">
      </div>
      <div class="field">
        <label class="lbl">Session fee (&#8377;)</label>
        <input class="inp" id="ex-fee" type="number" placeholder="750" inputmode="numeric">
      </div>
      <div class="field">
        <label class="lbl">Comments (optional)</label>
        <input class="inp" id="ex-comments" type="text" placeholder="Session notes">
      </div>
      <button class="btn-save" id="btn-ex-save" onclick="saveExisting()">Save session</button>
      <div id="ex-err" class="err hidden"></div>
    </div>
  </div>

  <div id="view-success" class="hidden">
    <div class="success-box">
      <div style="font-size:44px;margin-bottom:8px">&#9989;</div>
      <div class="success-title" id="success-title">Saved</div>
      <div class="success-sub" id="success-sub"></div>
      <div class="stat">
        <div class="stat-lbl">Total paid</div>
        <div class="stat-val" id="success-total">&#8377;0</div>
      </div>
      <div class="stat" style="margin-top:8px">
        <div class="stat-lbl">Client ID</div>
        <div class="stat-val" style="font-size:17px" id="success-id">â</div>
      </div>
    </div>
    <button class="btn-new" onclick="reset()">New session</button>
  </div>

</div>

<script>
var API="https://script.google.com/macros/s/AKfycbxsYdMdw4okQnllF_pfNi3M4d6mDlg8XC-4kC6j1XSPDLHrxx-_Or8zWjSPYog9JXYr_w/exec";
function today(){var d=new Date(),dd=String(d.getDate()).padStart(2,"0"),mm=String(d.getMonth()+1).padStart(2,"0");return dd+"/"+mm+"/"+d.getFullYear();}
function show(id){["view-lookup","view-new","view-existing","view-success"].forEach(function(v){document.getElementById(v).className=v===id?"":"hidden";});}
function showErr(id,msg){var e=document.getElementById(id);e.className="err";e.textContent=msg;}
function hideErr(id){document.getElementById(id).className="err hidden";}
function initials(n){var p=n.trim().split(" ");return p.length>=2?(p[0][0]+p[p.length-1][0]).toUpperCase():n.slice(0,2).toUpperCase();}
async function checkClient(){
  hideErr("lookup-err");
  var phone=document.getElementById("phone-inp").value.replace(/\D/g,"").trim();
  if(!phone||phone.length<7){showErr("lookup-err","Enter a valid phone number.");return;}
  var b=document.getElementById("btn-check");b.disabled=true;b.innerHTML='<span class="spinner"></span>Checking...';
  try{
    var r=await fetch(API+"?phone="+phone);var d=await r.json();
    b.disabled=false;b.textContent="Check client";
    if(d.status==="not_found"){document.getElementById("new-phone-label").textContent=phone;document.getElementById("new-date").value=today();show("view-new");}
    else if(d.status==="found"){document.getElementById("existing-name").textContent=d.name;document.getElementById("existing-avatar").textContent=initials(d.name);document.getElementById("existing-meta").textContent="Session #"+d.nextSession+" Â· ID: "+d.clientId;document.getElementById("ex-date").value=today();show("view-existing");}
    else{showErr("lookup-err",d.message||"Something went wrong.");}
  }catch(e){b.disabled=false;b.textContent="Check client";showErr("lookup-err","Network error. Check your connection.");}
}
async function saveNew(){
  hideErr("new-err");
  var phone=document.getElementById("phone-inp").value.replace(/\D/g,"").trim();
  var name=document.getElementById("new-name").value.trim();
  var age=document.getElementById("new-age").value.trim();
  var gender=document.getElementById("new-gender").value;
  var date=document.getElementById("new-date").value.trim()||today();
  var fee=document.getElementById("new-fee").value.trim();
  var comments=document.getElementById("new-comments").value.trim();
  if(!name){showErr("new-err","Name is required.");return;}
  if(!age){showErr("new-err","Age is required.");return;}
  if(!gender){showErr("new-err","Select a gender.");return;}
  if(!fee){showErr("new-err","Session fee is required.");return;}
  var b=document.getElementById("btn-new-save");b.disabled=true;b.innerHTML='<span class="spinner"></span>Saving...';
  try{
    var r=await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({phone:phone,name:name,age:Number(age),gender:gender,sessionDate:date,sessionFee:Number(fee),sessionComments:comments})});
    var d=await r.json();b.disabled=false;b.textContent="Save client";
    if(d.status==="created"){document.getElementById("success-title").textContent="New client saved";document.getElementById("success-sub").textContent=name+" Â· Session 1";document.getElementById("success-total").textContent="â¹"+Number(d.totalPaid).toLocaleString("en-IN");document.getElementById("success-id").textContent=d.clientId;show("view-success");}
    else{showErr("new-err",d.message||"Error saving.");}
  }catch(e){b.disabled=false;b.textContent="Save client";showErr("new-err","Network error.");}
}
async function saveExisting(){
  hideErr("ex-err");
  var phone=document.getElementById("phone-inp").value.replace(/\D/g,"").trim();
  var date=document.getElementById("ex-date").value.trim()||today();
  var fee=document.getElementById("ex-fee").value.trim();
  var comments=document.getElementById("ex-comments").value.trim();
  if(!fee){showErr("ex-err","Session fee is required.");return;}
  var b=document.getElementById("btn-ex-save");b.disabled=true;b.innerHTML='<span class="spinner"></span>Saving...';
  try{
    var r=await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({phone:phone,sessionDate:date,sessionFee:Number(fee),sessionComments:comments})});
    var d=await r.json();b.disabled=false;b.textContent="Save session";
    if(d.status==="updated"){document.getElementById("success-title").textContent="Session saved";document.getElementById("success-sub").textContent=d.clientName+" Â· Session #"+d.session;document.getElementById("success-total").textContent="â¹"+Number(d.totalPaid).toLocaleString("en-IN");document.getElementById("success-id").textContent=d.clientId;show("view-success");}
    else{showErr("ex-err",d.message||"Error saving.");}
  }catch(e){b.disabled=false;b.textContent="Save session";showErr("ex-err","Network error.");}
}
function reset(){
  ["phone-inp","new-name","new-age","new-fee","new-comments","ex-fee","ex-comments"].forEach(function(id){document.getElementById(id).value="";});
  document.getElementById("new-gender").value="";show("view-lookup");
}
</script>
</body>
</html>
